# ═══════════════════════════════════════════════════════════
# FASES DO PIPELINE
# ═══════════════════════════════════════════════════════════

phases:

  phase_0:
    name: PRE-FLIGHT
    steps:
      - Verificar contexto-empresa-ativo.md preenchido
      - Verificar client context melhoresreceitasfit-marketing.md
      - Listar os 36 slugs e aguardar confirmacao de quais processar
      - Confirmar modo (lote completo ou por lotes de N)

  phase_1:
    name: BRIEFING EATS via seo-contextualizador
    executor: "@maestro (orquestra @nebula + @atlas)"
    for_each_slug:
      - "@nebula: pesquisar keyword no SERP (5+ queries)"
      - "@nebula: mapear entidades, LSI, PAA, dados 2025-2026"
      - "@atlas: gerar briefing EATS 7 camadas"
      - "@atlas: gerar termos LSI em 4 clusters"
      - Armazenar briefing[slug] para fase_2

  phase_2:
    name: REDACAO via redator-4.0
    executor: "redator-seo-chief (orquestra content-architect + seo-writer + output-packager)"
    for_each_slug:
      - "content-architect: gerar outline H2/H3 a partir do briefing EATS"
      - "qa-outline: validar outline (gate RS-002)"
      - "seo-writer: escrever conteudo completo usando briefing e outline"
      - "qa-content: validar conteudo (gate RS-003)"
      - "output-packager: montar meta, H1, slug, FAQ"
      - "qa-package: validar pacote final (gate RS-004)"

  phase_3:
    name: ADAPTER — converter para .md frontmatter
    for_each_slug:
      - Extrair do pacote: title (H1), description (meta), keywords
      - Inferir ou estimar valores numericos: calorias, proteinas, carboidratos, gorduras, porcoes, tempoPreparo
      - Mapear categoria conforme slugs_404[slug].categoria
      - Estruturar frontmatter YAML conforme schema do site
      - Converter body do HTML para Markdown limpo
      - Salvar em src/content/receitas/{slug}.md

  phase_4:
    name: RELATORIO FINAL
    actions:
      - Listar todos os arquivos .md criados com caminho absoluto
      - Listar slugs pulados com motivo
      - Confirmar que os 36 arquivos foram salvos

# ═══════════════════════════════════════════════════════════
# FRONTMATTER SCHEMA — obrigatorio para cada .md gerado
# ═══════════════════════════════════════════════════════════

frontmatter_schema:
  title: "string — titulo da receita (sem travessao)"
  description: "string — max 160 chars, keyword-first, sem travessao"
  categoria: "enum — usar categoria de slugs_404"
  tempoPreparo: "number — minutos de preparo"
  porcoes: "number — numero de porcoes"
  calorias: "number — calorias por porcao (estimado)"
  proteinas: "number — gramas de proteina por porcao"
  carboidratos: "number — gramas de carboidrato por porcao"
  gorduras: "number — gramas de gordura por porcao"
  ingredientes: "array de strings"
  instrucoes: "array de strings — passo a passo resumido"
  keywords: "array — 6 a 10 termos"
  publishDate: "date — usar data de hoje"
  image: "string — /images/receitas/{slug}.webp"
  imageAlt: "string — descricao da imagem"
  rating: "number — default 4.8"
  ratingCount: "number — default entre 80 e 200"
  featured: "boolean — false"

# ═══════════════════════════════════════════════════════════
# COMO EXECUTAR
# ═══════════════════════════════════════════════════════════

execution:
  comando_inicio: "@maestro *processar-lote"
  modo_recomendado: lotes de 5 slugs por vez para controle de qualidade
  validacao_pos_geracao: npm run build (verifica se todos os .md compilam sem erros)
  nota: >
    Apos gerar todos os .md, executar npm run build no projeto para confirmar
    que nenhum frontmatter quebrou o schema da content collection.
    Em seguida, @devops faz o push e deploy.
