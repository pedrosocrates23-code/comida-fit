name: pipeline-404-recovery
version: 1.0.0
description: >
  Pipeline de recuperacao das 36 URLs com 404 do melhoresreceitasfit.com.br.
  Para cada slug: gera briefing EATS via seo-contextualizador, escreve conteudo
  via redator-4.0 e salva como .md em src/content/receitas/{slug}.md.
  Os 301 redirects da raiz para /receitas/ ja estao configurados no astro.config.mjs.

client: melhoresreceitasfit
client_slug: melhoresreceitasfit
output_dir: src/content/receitas/
output_format: markdown_frontmatter

restricoes_editoriais:
  - NUNCA usar travessao (substituir por virgula ou reescrita)
  - Tom acolhedor e pratico
  - Informacoes nutricionais obrigatorias no frontmatter
  - Comprimento ideal entre 1500 e 2500 palavras

squads:
  fase_1_briefing:
    squad: seo-contextualizador
    path: .squads/seo-contextualizador/
    agents: [maestro, nebula, atlas]
    context_file: .squads/seo-contextualizador/data/contexto-empresa-ativo.md

  fase_2_redacao:
    squad: redator-4.0
    path: .squads/redator-4.0/
    client_context: .squads/redator-4.0/knowledge/clients/melhoresreceitasfit-marketing.md
    output_format: markdown_com_frontmatter  # adaptado de HTML para .md

